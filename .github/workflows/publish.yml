name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build, Pack, and Publish
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore WindowsDisplay.sln

      - name: Build and Pack
        run: dotnet build WindowsDisplay.sln -c Release

      - name: Push to NuGet.org
        run: dotnet nuget push Release\*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Release\*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
