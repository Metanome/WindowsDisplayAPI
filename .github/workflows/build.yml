name: Build and Prerelease

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build & Prerelease
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine Version
        id: get_version
        run: |
          $githubVersionStr = ""
          try {
            $env:GH_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
            $rawTag = gh release view --json tagName --template '{{.tagName}}' 2>$null
            if ($rawTag) {
              $githubVersionStr = ([string]$rawTag).Trim()
              if ($githubVersionStr -match '^v?(\d+\.\d+\.\d+.*)$') {
                $githubVersionStr = $Matches[1]
              }
            }
          } catch {
            # No release found or command failed
          }

          $csprojPath = "WindowsDisplayAPI\WindowsDisplayAPI.csproj"
          [xml]$xml = Get-Content $csprojPath
          $csprojVersionStr = ""
          foreach ($pg in $xml.Project.PropertyGroup) {
            if ($pg.Version) {
              $csprojVersionStr = $pg.Version
              break
            }
          }
          if (!$csprojVersionStr) {
            $csprojVersionStr = "1.0.0"
          }

          $githubVersion = $null
          if ($githubVersionStr) {
            $githubVersion = [version]$githubVersionStr
          }
          $csprojVersion = [version]$csprojVersionStr

          $baseVersion = $csprojVersion
          if ($githubVersion -and $githubVersion -ge $csprojVersion) {
            $baseVersion = [version]::new($githubVersion.Major, $githubVersion.Minor, ($githubVersion.Build + 1))
          }

          $finalVersion = "$($baseVersion.ToString(3))-pre${{ github.run_number }}"
          echo "version=$finalVersion" >> $env:GITHUB_OUTPUT
          $global:LASTEXITCODE = 0
        shell: powershell

      - name: Restore Dependencies
        run: dotnet restore WindowsDisplayAPI\WindowsDisplayAPI.csproj

      - name: Build
        run: dotnet build WindowsDisplayAPI\WindowsDisplayAPI.csproj -c Release /p:Version=${{ steps.get_version.outputs.version }}

      - name: Pack
        run: dotnet pack WindowsDisplayAPI\WindowsDisplayAPI.csproj -c Release /p:Version=${{ steps.get_version.outputs.version }} -o Release

      - name: NuGet login
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: NuGet/login@v1
        id: login
        with:
          user: LenovoLegionToolkit-Team

      - name: Push to NuGet.org
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: dotnet nuget push Release\*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
